name: Latest Blog Posts Workflow

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Update Blog Posts
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          # Focus entirely on the verified working PhD feed for now
          feed_list: "https://phdsensei.eds-360.com/functions/feed"
          feed_names: "PhD Sensei"
          max_post_count: 5
          template: "$randomEmoji(🎓,🚀,💡) [$feedName] [$title]($url) ($date)"
          date_format: "mmm dd, yyyy"
