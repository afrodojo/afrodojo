name: Latest Blog Posts Workflow

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      # Updated to v4.2.2+ to fully support modern GitHub Node 24 runners natively
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Fetch and Update Blog Posts
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          # Swapped Cyber Dojo to its convenience redirect path matching the app structure
          feed_list: "https://cyberdojosensei.eds-360.com/feed,https://phdsensei.eds-360.com/functions/feed"
          feed_names: "Cyber Dojo,PhD Sensei"
          max_post_count: 5
          template: "$randomEmoji(🔥,🚀,💡) [$feedName] [$title]($url) ($date)"
          date_format: "mmm dd, yyyy"
